<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUPG - Random User Page Generator</title>
    <script type="module" src="./scripts/main.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
        <!-- header -->
         <header class="header-container">
            <div class="logo-container">
                <img src="./images/logo-RUPG.svg" alt="RUPG" >
                <h1 class="logo-txt">RUPG</h1>
            </div>
            <div class="action-buttons">
                <div class="button-container">
                    <button id="generateButton" type="button" class="main-button">
                        <img src="./images/generate.svg" alt="">
                        Generate New Profile
                    </button>       
                </div>

                <div class="button-container load-profile-container">
                    <button id="loadButton" type="button" class="side-button">
                        <img src="./images/load.svg" alt="">
                        Load Profile
                    </button>

                    <div class="select-profile-container hidden"></div> 
                </div>

                <div class="button-container">
                    <button id="saveButton" type="button" class="side-button">
                        <img src="./images/save.svg" alt="">
                        Save Profile
                    </button>   
                </div>
            </div>

         </header>
         <div id="errorMessage" class="error-message hidden"></div>
         <div id="succsesMessage" class="succses-message hidden"></div>
        <!-- main -->
         <main class="main-container">
            <div class="profile-card">
                <div class="background-container">
                    <img src="./images/background-placeholder.jpg" alt="background">
                </div>
                <div class="profile-content-container">
                    <div class="photo-container">
                        <img id="userImage" class="user-image" src="./images/Portrait_Placeholder.png" alt="User profile image">
                    </div>
                    <div class="user-info-container">
                        <div class="name-row-container">
                            <h2 id="userFullName" class="user-full-name">Jon Doe Placeholder</h2>
                        </div>
                        <div class="location-container">
                            <img id="locationImage"  src="">
                            <p id="userLocation" class="user-location">location Placeholder</p>
                        </div>

                    </div>
                </div>
            </div>
            <div class="about-card">
                <div class="about-header-container">
                    <div class="about-image-container">
                        <img class="about-image" src="./images/about.svg" alt="About icon">
                    </div>

                    <div class="about-title-container">
                        <h3 class="title">About Me</h3>
                    </div>
                </div>

                <div class="about-content-container">
                    <p id="aboutText" class="about-text">About me placeholder</p>
                </div>
            </div>
            <div class="info-cards-container">
                <div class="quote-card">
                    <div class="quote-image-container">
                        <img class="quote-image" src="./images/quote.png" alt="Quote image">
                    </div>

                    <div class="quote-content-container">
                        <h3 class="title">Today's Quote</h3>
                        <p id="quoteText" class="quote-text">Quote placeholder</p>                                                      
                        <p class="quote-author">- Kanye West</p>
                    </div>
                </div>
                <div class="pokemon-card">
                    <div class="pokemon-image-container">
                        <img id="pokemonImage" class="pokemon-image" src="" alt="Pokemon image">
                    </div>
                    <div class="pokemon-info-container">
                        <h3 class="title">Favorite Pokemon</h3>
                        <h2 id="pokemonName" class="pokemon-name">Pokemon Name Placeholder</h2>                                            
                    </div>
                    
                </div>
            </div>
            <div class="friends-card">
                <div class="friends-header-container">
                    <h3 id="friendsTitle" class="title">Placeholder</h3>
                </div>
                <div id="friendsList" class="friends-list-container"></div>
            </div>

            
         </main>

    </div>
</body>
</html>
