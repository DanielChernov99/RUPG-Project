<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUPG - Random User Page Generator</title>
    <script src="./scripts/main.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
        <!-- header -->
         <header class="header-container">
            <div class="logo-container">
                <img src="./images/logo RUPG.svg" alt="RUPG" >
                <h1 class="logo-txt">RUPG</h1>
            </div>
            <div class="action-buttons">
                <div class="button-container">
                    <button id="generateButton" type="button" class="side-button">Generate New Profile</button>
                    <img src="" alt="">
                </div>
                <div class="button-container">
                    <button id="loadButton" type="button" class="side-button">Load Profile</button>
                    <img src="" alt="">
                </div>
                <div class="button-container">
                    <button id="saveButton" type="button" class="main-button">Save Profile</button>
                    <img src="" alt="">
                </div>
            </div>
         </header>

        <!-- main -->
         <main class="main-container">
            <div class="profile-card">
                <div class="background-container">
                    <img src="" alt="background">
                </div>
                <div class="profile-content-container">
                    <div class="photo-container">
                        <img id="userImage" class="user-image" src="" alt="User profile image">
                    </div>
                    <div class="user-info-container">
                        <div class="name-row-container">
                            <h2 id="userFullName" class="user-full-name">Jon Doe Placeholder</h2>
                        </div>
                        <div class="location-container">
                            <img id="locationImage"  src="">
                            <p id="userLocation" class="user-location">location Placeholder</p>
                        </div>

                    </div>
                </div>
            </div>
            <div class="info-cards-container">
                <div class="quote-card">
                    <div class="quote-image-container">
                        <img class="quote-image" src="" alt="">
                    </div>

                    <div class="quote-content-container">
                        <h3>Today's Quote</h3>
                        <p id="quoteText" class="quote-text">Quote placeholder</p>                                                      
                        <p class="quote-author">- Kanye West</p>
                    </div>
                </div>
                <div class="pokemon-card">
                    <div class="pokemon-info-container">
                        <h3>Favorite Pokemon</h3>
                        <h2 id="pokemonName" class="pokemon-name">Pokemon Name Placeholder</h2>                                            
                    </div>
                    <div class="pokemon-image-container">
                        <img id="pokemonImage" class="pokemon-image" src="" alt="Pokemon image">
                    </div>
                </div>
            </div>
         </main>

    </div>
</body>
</html>
