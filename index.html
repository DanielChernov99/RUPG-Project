<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="./scripts/main.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

            </div>
            <div class="action-buttons">
                <div class="button-container">
                    <button type="button" class="side-button">Generate New Profile</button>

                    <button type="button" class="side-button">Load Profile</button>
                    <img src="" alt="">

                <div class="button-container">
                    <button type="button" class="main-button">Save Profile</button>
                    <img src="" alt="">
                </div>
            </div>
         </header>

        <!-- main -->

    </div>
